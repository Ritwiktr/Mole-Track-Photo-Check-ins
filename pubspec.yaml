name: skin_care_ai
description: Skin Care AI — skincare routine coaching and photo progress check-ins with local-first storage.
publish_to: "none"
version: 1.0.0+3

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  intl: ^0.20.2
  percent_indicator: ^4.2.3
  http: ^1.2.2
  flutter_dotenv: ^5.2.1
  image_picker: ^1.2.0
  in_app_purchase: ^3.2.3
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icon/app_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  remove_alpha_ios: true
